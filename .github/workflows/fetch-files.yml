name: Fetch External Files

on:
  workflow_dispatch:  # You can trigger this manually anytime
  push:
    paths:
      - 'url-list.txt'  # Triggers when you update the URL list

jobs:
  fetch-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download files from URL list
        run: |
          mkdir -p files
          while IFS= read -r url; do
            # Skip empty lines and comments
            [[ -z "$url" || "$url" == \#* ]] && continue
            filename=$(basename "$url")
            echo "Downloading: $filename"
            curl -L -o "files/$filename" "$url"
          done < url-list.txt

      - name: Commit and push files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add/update files" || true
          git pull origin main --rebase  # Add this line
          git push origin main
