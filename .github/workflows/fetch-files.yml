name: Fetch External Files & Split into 45MB Zip Parts (with LFS)

on:
  workflow_dispatch:
  push:
    paths:
      - 'url-list.txt'

jobs:
  fetch-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Git LFS
        run: |
          sudo apt-get install git-lfs
          git lfs install

      - name: Download files from URL list
        run: |
          mkdir -p downloads
          while IFS= read -r url; do
            [[ -z "$url" || "$url" == \#* ]] && continue
            filename=$(basename "$url" | cut -d'?' -f1)
            echo "Downloading: $filename"
            curl -L -o "downloads/$filename" "$url"
          done < url-list.txt

      - name: Split each file into 45MB zip parts
        run: |
          mkdir -p parts
          
          for file in downloads/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name_without_ext="${filename%.*}"
              
              echo "Processing: $filename"
              zip -s 45m -r "parts/${name_without_ext}.zip" "$file" -j
              
              for part in parts/${name_without_ext}.z*; do
                if [ -f "$part" ]; then
                  num=$(echo "$part" | grep -oP 'z\K\d+')
                  mv "$part" "parts/${name_without_ext}.zip.$(printf '%03d' $num)"
                fi
              done
              
              if [ -f "parts/${name_without_ext}.zip" ] && [ ! -f "parts/${name_without_ext}.zip.001" ]; then
                mv "parts/${name_without_ext}.zip" "parts/${name_without_ext}.zip.001"
              fi
              
              echo "Created $(ls parts/${name_without_ext}.zip.* 2>/dev/null | wc -l) parts for $filename"
            fi
          done

      - name: Configure Git LFS for large files
        run: |
          git lfs track "parts/*.zip.*"
          git add .gitattributes

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add parts/ downloads/ .gitattributes
          git diff --staged --quiet || git commit -m "Add split files (45MB parts)"
          git pull origin main --rebase
          git push origin main
