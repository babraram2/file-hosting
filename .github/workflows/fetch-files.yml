name: Fetch External Files & Split into 45MB Zip Parts

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'url-list.txt'  # Triggers when you update the URL list

jobs:
  fetch-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .gitignore to exclude downloads folder
        run: |
          echo "downloads/" >> .gitignore

      - name: Download files from URL list
        run: |
          mkdir -p downloads
          while IFS= read -r url; do
            # Skip empty lines and comments
            [[ -z "$url" || "$url" == \#* ]] && continue
            filename=$(basename "$url" | cut -d'?' -f1)
            echo "Downloading: $filename"
            curl -L -o "downloads/$filename" "$url"
          done < url-list.txt

      - name: Split each file into 45MB zip parts
        run: |
          mkdir -p parts
          
          for file in downloads/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name_without_ext="${filename%.*}"
              
              echo "Processing: $filename"
              
              # Create zip and split into 45MB parts
              zip -s 45m -r "parts/${name_without_ext}.zip" "$file" -j
              
              # Rename the main .zip file to .zip.001
              if [ -f "parts/${name_without_ext}.zip" ]; then
                mv "parts/${name_without_ext}.zip" "parts/${name_without_ext}.zip.001"
              fi
              
              # Rename .z01, .z02, ... to .zip.002, .zip.003, ...
              counter=2
              for part in parts/${name_without_ext}.z[0-9]*; do
                if [ -f "$part" ]; then
                  padded_num=$(printf '%03d' "$counter")
                  mv "$part" "parts/${name_without_ext}.zip.$padded_num"
                  counter=$((counter + 1))
                fi
              done
              
              echo "Created $((counter - 1)) parts for $filename"
            fi
          done
          
          # Remove downloads folder to avoid any accidental commit
          rm -rf downloads

      - name: Generate README with part list and reassembly instructions
        run: |
          echo "# 📦 Split Files (45MB Parts)" > parts/README.md
          echo "" >> parts/README.md
          echo "Each file below is split into **45MB zip parts**." >> parts/README.md
          echo "" >> parts/README.md
          
          # List all unique base names from parts
          for base in $(ls parts/*.zip.001 2>/dev/null | sed 's/\.zip\.001$//' | sort -u); do
            base_name=$(basename "$base")
            part_count=$(ls parts/${base_name}.zip.* 2>/dev/null | wc -l)
            
            echo "## 📄 ${base_name}.safetensors (Parts: $part_count)" >> parts/README.md
            echo "" >> parts/README.md
            
            for part in $(ls parts/${base_name}.zip.* 2>/dev/null | sort -V); do
              part_name=$(basename "$part")
              part_size=$(du -h "$part" | cut -f1)
              echo "- [$part_name](https://github.com/${{ github.repository }}/raw/main/parts/$part_name) ($part_size)" >> parts/README.md
            done
            echo "" >> parts/README.md
          done
          
          echo "## 🔧 How to Reassemble" >> parts/README.md
          echo "" >> parts/README.md
          echo "### Linux/macOS:" >> parts/README.md
          echo '```bash' >> parts/README.md
          echo '# Download all parts, then:' >> parts/README.md
          echo 'cat filename.zip.* > filename.zip' >> parts/README.md
          echo 'unzip filename.zip' >> parts/README.md
          echo '```' >> parts/README.md
          echo "" >> parts/README.md
          echo "### Windows (Command Prompt):" >> parts/README.md
          echo '```cmd' >> parts/README.md
          echo 'copy /b filename.zip.001 + filename.zip.002 + filename.zip.003 filename.zip' >> parts/README.md
          echo '```' >> parts/README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .gitignore parts/
          git diff --staged --quiet || git commit -m "Add split files (45MB parts)"
          git pull origin main --rebase
          git push origin main
