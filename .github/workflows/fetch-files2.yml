name: Fetch External Files & Split into 45MB Zip Parts

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'url-list.txt'  # Triggers when you update the URL list

jobs:
  fetch-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .gitignore to exclude downloads folder
        run: |
          echo "downloads/" >> .gitignore

      - name: Download files from URL list
        run: |
          mkdir -p downloads
          while IFS= read -r url; do
            # Skip empty lines and comments
            [[ -z "$url" || "$url" == \#* ]] && continue
            filename=$(basename "$url" | cut -d'?' -f1)
            echo "Downloading: $filename"
            curl -L -o "downloads/$filename" "$url"
          done < url-list.txt

      - name: Split each file into 45MB zip parts
        run: |
          for file in downloads/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name_without_ext="${filename%.*}"
              
              echo "Processing: $filename"
              
              # Create a new folder named after the file
              mkdir -p "model/${name_without_ext}"
              
              # Create zip and split into 45MB parts in the file's own folder
              zip -s 45m -r "model/${name_without_ext}/${name_without_ext}.zip" "$file" -j
              
              echo "Created split zip parts for $filename in model/${name_without_ext}/"
              ls -la model/${name_without_ext}/
            fi
          done
          
          # Remove downloads folder to avoid any accidental commit
          rm -rf downloads

      - name: Generate README with part list and reassembly instructions
        run: |
          echo "# 📦 Split Files (45MB parts)" > model/README.md
          echo "" >> model/README.md
          echo "Each file below is split into **45MB zip parts** and stored in its own folder." >> model/README.md
          echo "" >> model/README.md
          
          # List all folders in model directory
          for folder in model/*/; do
            if [ -d "$folder" ] && [ "$folder" != "model/README.md" ]; then
              folder_name=$(basename "$folder")
              part_count=$(ls ${folder}*.zip* 2>/dev/null | wc -l)
              
              echo "## 📄 ${folder_name}" >> model/README.md
              echo "" >> model/README.md
              echo "**Parts: $part_count**" >> model/README.md
              echo "" >> model/README.md
              
              for part in $(ls ${folder}*.zip* 2>/dev/null | sort -V); do
                part_name=$(basename "$part")
                part_size=$(du -h "$part" | cut -f1)
                echo "- [$part_name](https://github.com/${{ github.repository }}/raw/main/model/${folder_name}/$part_name) ($part_size)" >> model/README.md
              done
              echo "" >> model/README.md
            fi
          done
          
          echo "## 🔧 How to Reassemble" >> model/README.md
          echo "" >> model/README.md
          echo "### Option 1: Download using Git (PowerShell)" >> model/README.md
          echo "" >> model/README.md
          echo "Use this PowerShell script to download all parts for a specific file:" >> model/README.md
          echo "" >> model/README.md
          echo '```powershell' >> model/README.md
          echo '# Clone the repository with sparse checkout to get only the model files' >> model/README.md
          echo 'git clone --filter=blob:none --sparse https://github.com/${{ github.repository }}.git' >> model/README.md
          echo 'cd ${{ github.event.repository.name }}' >> model/README.md
          echo '' >> model/README.md
          echo '# Enable sparse checkout and set it to get only the model folder you need' >> model/README.md
          echo 'git sparse-checkout init --cone' >> model/README.md
          echo 'git sparse-checkout set model/foldername' >> model/README.md
          echo '' >> model/README.md
          echo '# Pull the LFS files' >> model/README.md
          echo 'git lfs pull' >> model/README.md
          echo '' >> model/README.md
          echo '# Navigate to the folder' >> model/README.md
          echo 'cd model/foldername' >> model/README.md
          echo '' >> model/README.md
          echo '# Reassemble and extract the file' >> model/README.md
          echo 'unzip filename.zip' >> model/README.md
          echo '```' >> model/README.md
          echo "" >> model/README.md
          echo "**Note:** Replace \`foldername\` and \`filename\` with the actual folder and file names from above." >> model/README.md
          echo "" >> model/README.md
          echo "### Option 2: Download individual files (Linux/macOS)" >> model/README.md
          echo "" >> model/README.md
          echo '```bash' >> model/README.md
          echo '# Download all parts manually (replace foldername with actual name)' >> model/README.md
          echo 'mkdir -p model/foldername' >> model/README.md
          echo 'cd model/foldername' >> model/README.md
          echo '' >> model/README.md
          echo '# Download each part (check the parts list above for exact filenames)' >> model/README.md
          echo 'wget https://github.com/${{ github.repository }}/raw/main/model/foldername/filename.zip' >> model/README.md
          echo 'wget https://github.com/${{ github.repository }}/raw/main/model/foldername/filename.z01' >> model/README.md
          echo '# ... continue for all parts ...' >> model/README.md
          echo '' >> model/README.md
          echo '# Extract the file' >> model/README.md
          echo 'unzip filename.zip' >> model/README.md
          echo '```' >> model/README.md
          echo "" >> model/README.md
          echo "### Option 3: Download with PowerShell (Windows)" >> model/README.md
          echo "" >> model/README.md
          echo '```powershell' >> model/README.md
          echo '# Create folder and download all parts (replace foldername and filename)' >> model/README.md
          echo '$folder = "model/foldername"' >> model/README.md
          echo 'New-Item -ItemType Directory -Force -Path $folder' >> model/README.md
          echo 'cd $folder' >> model/README.md
          echo '' >> model/README.md
          echo '# Download each part (check the parts list above for exact filenames)' >> model/README.md
          echo 'Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/raw/main/model/foldername/filename.zip" -OutFile "filename.zip"' >> model/README.md
          echo 'Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/raw/main/model/foldername/filename.z01" -OutFile "filename.z01"' >> model/README.md
          echo '# ... continue for all parts ...' >> model/README.md
          echo '' >> model/README.md
          echo '# Extract using 7-Zip or WinRAR' >> model/README.md
          echo '# Right-click filename.zip → Extract Here' >> model/README.md
          echo '```' >> model/README.md
          echo "" >> model/README.md
          echo "## 📝 Notes" >> model/README.md
          echo "" >> model/README.md
          echo "- Git clone with sparse checkout is the fastest way to get all parts" >> model/README.md
          echo "- All files use Git LFS (Large File Storage)" >> model/README.md
          echo "- Make sure you have Git LFS installed: https://git-lfs.com" >> model/README.md
          echo "- Split archives can be extracted with 7-Zip, WinRAR, or the unzip command" >> model/README.md

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "model/**/*.zip"
          git lfs track "model/**/*.z[0-9][0-9]"
          git add .gitattributes
          git add model/
          git commit -m "Add split zip parts in separate folders" || echo "No changes to commit"
          git push origin main
