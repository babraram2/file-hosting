name: Fetch External Files & Split into 45MB Zip model

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'url-list.txt'  # Triggers when you update the URL list

jobs:
  fetch-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .gitignore to exclude downloads folder
        run: |
          echo "downloads/" >> .gitignore

      - name: Download files from URL list
        run: |
          mkdir -p downloads
          while IFS= read -r url; do
            # Skip empty lines and comments
            [[ -z "$url" || "$url" == \#* ]] && continue
            filename=$(basename "$url" | cut -d'?' -f1)
            echo "Downloading: $filename"
            curl -L -o "downloads/$filename" "$url"
          done < url-list.txt

      - name: Split each file into 45MB zip model
        run: |
          mkdir -p model
          
          for file in downloads/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name_without_ext="${filename%.*}"
              
              echo "Processing: $filename"
              
              # Create zip and split into 45MB model
              zip -s 10m -r "model/${name_without_ext}.zip" "$file" -j
              
              # Rename the main .zip file to .zip.001
              if [ -f "model/${name_without_ext}.zip" ]; then
                mv "model/${name_without_ext}.zip" "model/${name_without_ext}.zip.001"
              fi
              
              # Rename .z01, .z02, ... to .zip.002, .zip.003, ...
              counter=2
              for part in model/${name_without_ext}.z[0-9]*; do
                if [ -f "$part" ]; then
                  padded_num=$(printf '%03d' "$counter")
                  mv "$part" "model/${name_without_ext}.zip.$padded_num"
                  counter=$((counter + 1))
                fi
              done
              
              echo "Created $((counter - 1)) model for $filename"
            fi
          done
          
          # Remove downloads folder to avoid any accidental commit
          rm -rf downloads

      - name: Generate README with part list and reassembly instructions
        run: |
          echo "# 📦 Split Files (45MB model)" > model/README.md
          echo "" >> model/README.md
          echo "Each file below is split into **10MB zip model**." >> model/README.md
          echo "" >> model/README.md
          
          # List all unique base names from model
          for base in $(ls model/*.zip.001 2>/dev/null | sed 's/\.zip\.001$//' | sort -u); do
            base_name=$(basename "$base")
            part_count=$(ls model/${base_name}.zip.* 2>/dev/null | wc -l)
            
            echo "## 📄 ${base_name}.safetensors (model: $part_count)" >> model/README.md
            echo "" >> model/README.md
            
            for part in $(ls model/${base_name}.zip.* 2>/dev/null | sort -V); do
              part_name=$(basename "$part")
              part_size=$(du -h "$part" | cut -f1)
              echo "- [$part_name](https://github.com/${{ github.repository }}/raw/main/model/$part_name) ($part_size)" >> model/README.md
            done
            echo "" >> model/README.md
          done
          
          echo "## 🔧 How to Reassemble" >> model/README.md
          echo "" >> model/README.md
          echo "### Linux/macOS:" >> model/README.md
          echo '```bash' >> model/README.md
          echo '# Download all model, then:' >> model/README.md
          echo 'cat filename.zip.* > filename.zip' >> model/README.md
          echo 'unzip filename.zip' >> model/README.md
          echo '```' >> model/README.md
          echo "" >> model/README.md
          echo "### Windows (Command Prompt):" >> model/README.md
          echo '```cmd' >> model/README.md
          echo 'copy /b filename.zip.001 + filename.zip.002 + filename.zip.003 filename.zip' >> model/README.md
          echo '```' >> model/README.md

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "model/*.zip.*"
          git add .gitattributes
          git add model/
          git commit -m "Track zip parts with Git LFS"
          git push origin main
