name: Fetch External Files & Split into 45MB Zip model

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'url-list.txt'  # Triggers when you update the URL list

jobs:
  fetch-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .gitignore to exclude downloads folder
        run: |
          echo "downloads/" >> .gitignore

      - name: Download files from URL list
        run: |
          mkdir -p downloads
          while IFS= read -r url; do
            # Skip empty lines and comments
            [[ -z "$url" || "$url" == \#* ]] && continue
            filename=$(basename "$url" | cut -d'?' -f1)
            echo "Downloading: $filename"
            curl -L -o "downloads/$filename" "$url"
          done < url-list.txt

      - name: Split each file into 45MB zip model
        run: |
          mkdir -p model
          
          for file in downloads/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name_without_ext="${filename%.*}"
              
              echo "Processing: $filename"
              
              # Create zip and split into 45MB parts (keeps original .zip, .z01, .z02 names)
              zip -s 45m -r "model/${name_without_ext}.zip" "$file" -j
              
              echo "Created split zip parts for $filename"
              ls -la model/${name_without_ext}.zip*
            fi
          done
          
          # Remove downloads folder to avoid any accidental commit
          rm -rf downloads

      - name: Generate README with part list and reassembly instructions
        run: |
          echo "# 📦 Split Files (45MB parts)" > model/README.md
          echo "" >> model/README.md
          echo "Each file below is split into **45MB zip parts**." >> model/README.md
          echo "" >> model/README.md
          
          # List all unique base names from model
          for base in $(ls model/*.zip 2>/dev/null | sed 's/\.zip$//' | sort -u); do
            base_name=$(basename "$base")
            part_count=$(ls model/${base_name}.zip* 2>/dev/null | wc -l)
            
            echo "## 📄 ${base_name}.safetensors (parts: $part_count)" >> model/README.md
            echo "" >> model/README.md
            
            for part in $(ls model/${base_name}.zip* 2>/dev/null | sort -V); do
              part_name=$(basename "$part")
              part_size=$(du -h "$part" | cut -f1)
              echo "- [$part_name](https://github.com/${{ github.repository }}/raw/main/model/$part_name) ($part_size)" >> model/README.md
            done
            echo "" >> model/README.md
          done
          
          echo "## 🔧 How to Reassemble" >> model/README.md
          echo "" >> model/README.md
          echo "### Linux/macOS:" >> model/README.md
          echo '```bash' >> model/README.md
          echo '# For the main zip file (filename.zip):' >> model/README.md
          echo '# Download all parts (filename.zip, filename.z01, filename.z02, etc.)' >> model/README.md
          echo '# Then simply unzip the main file:' >> model/README.md
          echo 'unzip filename.zip' >> model/README.md
          echo '# zip will automatically find and use the .z01, .z02 parts' >> model/README.md
          echo '```' >> model/README.md
          echo "" >> model/README.md
          echo "### Windows:" >> model/README.md
          echo '```cmd' >> model/README.md
          echo '# Download all parts (filename.zip, filename.z01, filename.z02, etc.)' >> model/README.md
          echo '# Then extract using 7-Zip or WinRAR:' >> model/README.md
          echo '# Right-click filename.zip → Extract Here' >> model/README.md
          echo '```' >> model/README.md

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "model/*.zip"
          git lfs track "model/*.z[0-9][0-9]"
          git add .gitattributes
          git add model/
          git commit -m "Add split zip parts with original naming"
          git push origin main
