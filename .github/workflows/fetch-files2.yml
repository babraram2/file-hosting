name: Fetch External Files & Split into 45MB Zip parts2

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'url-list.txt'  # Triggers when you update the URL list

jobs:
  fetch-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .gitignore to exclude downloads folder
        run: |
          echo "downloads/" >> .gitignore

      - name: Download files from URL list
        run: |
          mkdir -p downloads
          while IFS= read -r url; do
            # Skip empty lines and comments
            [[ -z "$url" || "$url" == \#* ]] && continue
            filename=$(basename "$url" | cut -d'?' -f1)
            echo "Downloading: $filename"
            curl -L -o "downloads/$filename" "$url"
          done < url-list.txt

      - name: Split each file into 45MB zip parts2
        run: |
          mkdir -p parts2
          
          for file in downloads/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name_without_ext="${filename%.*}"
              
              echo "Processing: $filename"
              
              # Create zip and split into 45MB parts2
              zip -s 45m -r "parts2/${name_without_ext}.zip" "$file" -j
              
              # Rename the main .zip file to .zip.001
              if [ -f "parts2/${name_without_ext}.zip" ]; then
                mv "parts2/${name_without_ext}.zip" "parts2/${name_without_ext}.zip.001"
              fi
              
              # Rename .z01, .z02, ... to .zip.002, .zip.003, ...
              counter=2
              for part in parts2/${name_without_ext}.z[0-9]*; do
                if [ -f "$part" ]; then
                  padded_num=$(printf '%03d' "$counter")
                  mv "$part" "parts2/${name_without_ext}.zip.$padded_num"
                  counter=$((counter + 1))
                fi
              done
              
              echo "Created $((counter - 1)) parts2 for $filename"
            fi
          done
          
          # Remove downloads folder to avoid any accidental commit
          rm -rf downloads

      - name: Generate README with part list and reassembly instructions
        run: |
          echo "# 📦 Split Files (45MB parts2)" > parts2/README.md
          echo "" >> parts2/README.md
          echo "Each file below is split into **45MB zip parts2**." >> parts2/README.md
          echo "" >> parts2/README.md
          
          # List all unique base names from parts2
          for base in $(ls parts2/*.zip.001 2>/dev/null | sed 's/\.zip\.001$//' | sort -u); do
            base_name=$(basename "$base")
            part_count=$(ls parts2/${base_name}.zip.* 2>/dev/null | wc -l)
            
            echo "## 📄 ${base_name}.safetensors (parts2: $part_count)" >> parts2/README.md
            echo "" >> parts2/README.md
            
            for part in $(ls parts2/${base_name}.zip.* 2>/dev/null | sort -V); do
              part_name=$(basename "$part")
              part_size=$(du -h "$part" | cut -f1)
              echo "- [$part_name](https://github.com/${{ github.repository }}/raw/main/parts2/$part_name) ($part_size)" >> parts2/README.md
            done
            echo "" >> parts2/README.md
          done
          
          echo "## 🔧 How to Reassemble" >> parts2/README.md
          echo "" >> parts2/README.md
          echo "### Linux/macOS:" >> parts2/README.md
          echo '```bash' >> parts2/README.md
          echo '# Download all parts2, then:' >> parts2/README.md
          echo 'cat filename.zip.* > filename.zip' >> parts2/README.md
          echo 'unzip filename.zip' >> parts2/README.md
          echo '```' >> parts2/README.md
          echo "" >> parts2/README.md
          echo "### Windows (Command Prompt):" >> parts2/README.md
          echo '```cmd' >> parts2/README.md
          echo 'copy /b filename.zip.001 + filename.zip.002 + filename.zip.003 filename.zip' >> parts2/README.md
          echo '```' >> parts2/README.md

      - name: Commit and push
        run: |
          git lfs install
          git lfs track "parts2/*.zip.*"
          git add .gitattributes
          git add parts2/
          git commit -m "Track zip parts with Git LFS"
          git push origin main
